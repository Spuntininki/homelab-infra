# Infisical backend configuration
infisical:
  enabled: true
  name: infisical
  replicaCount: 1  # Homelab: single replica
  
  image:
    repository: infisical/infisical
    tag: "v0.161.3"
    pullPolicy: IfNotPresent
  
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1024Mi
  
  # Disable auto-bootstrap (manual setup via UI)
  autoBootstrap:
    enabled: false
  
  # Read DB_CONNECTION_URI and REDIS_URL from infisical-secrets
  useExistingConnectionStringSecret:
    enabled: true

# PostgreSQL configuration
postgresql:
  enabled: true
  fullnameOverride: "infisical-postgresql"

  auth:
    username: infisical
    database: infisicalDB
    existingSecret: "infisical-postgresql"
    secretKeys:
      adminPasswordKey: "postgres-password"
      userPasswordKey: "password"
  
  primary:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    
    persistence:
      enabled: true
      size: 5Gi

# Redis configuration
redis:
  enabled: true
  fullnameOverride: "infisical-redis"
  architecture: standalone

  auth:
    enabled: true
    existingSecret: "infisical-redis"
    existingSecretPasswordKey: "redis-password"
  
  master:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    
    persistence:
      enabled: false  # Redis: cache is volatile
    
    # Critical: Redis memory configuration
    configuration: |-
      maxmemory 200mb
      maxmemory-policy allkeys-lru
      appendonly no

# Ingress configuration for Traefik
ingress:
  enabled: true
  hostName: "infisical.local"
  ingressClassName: "traefik"  # Use existing k3d Traefik
  
  nginx:
    enabled: false  # Disable bundled NGINX
  
  annotations:
    # Traefik: use HTTP entrypoint (port 80)
    traefik.ingress.kubernetes.io/router.entrypoints: web
  
  tls: []  # HTTPS to be configured later

# Disable bundled ingress-nginx chart
ingress-nginx:
  enabled: false
