apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/headlamp/
    chart: headlamp
    targetRevision: 0.43.0
    helm:
      values: |
        config:
          baseURL: ""
        service:
          type: ClusterIP
          port: 80
        ingress:
          enabled: true
          ingressClassName: traefik
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            cert-manager.io/cluster-issuer: selfsigned-issuer
          hosts:
            - host: headlamp.sputinik.tech
              paths:
                - path: /
                  type: Prefix
          tls:
            - hosts:
                - headlamp.sputinik.tech
              secretName: headlamp-server-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
