apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-demo
  namespace: vault-demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: vault-demo-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: secret/demo
        property: username
    - secretKey: password
      remoteRef:
        key: secret/demo
        property: password
